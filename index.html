<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VerityLights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#1c1812;--bark:#3d3020;--clay:#7a5c3e;--sand:#c4a97d;--warm:#e8d5b5;--parchment:#f4ede0;--cream:#faf6ef;--moss:#4a5240;--sage:#8a9478;--border:rgba(122,92,62,0.2);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Raleway',sans-serif;background:var(--cream);color:var(--ink);font-weight:300;overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:1.5rem 5rem;background:rgba(250,246,239,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.nav-brand{text-decoration:none;cursor:pointer}
.nav-brand-name{font-family:'Playfair Display',serif;font-size:1.55rem;font-weight:400;color:var(--ink);letter-spacing:.04em;line-height:1}
.nav-brand-name span{color:var(--clay);font-style:italic}
.nav-brand-sub{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--sage);margin-top:2px;display:block}
.nav-links{display:flex;gap:2.5rem;list-style:none}
.nav-links a{font-size:.73rem;letter-spacing:.18em;text-transform:uppercase;color:var(--bark);text-decoration:none;position:relative;transition:color .3s;cursor:pointer}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--clay);transition:width .35s}
.nav-links a:hover,.nav-links a.active-nav{color:var(--clay)}
.nav-links a:hover::after,.nav-links a.active-nav::after{width:100%}
.nav-cart-btn{background:none;border:1px solid var(--sand);color:var(--clay);padding:.55rem 1.3rem;font-family:'Raleway',sans-serif;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:background .3s,color .3s}
.nav-cart-btn:hover{background:var(--clay);color:white;border-color:var(--clay)}
.back-btn{display:inline-flex;align-items:center;gap:.5rem;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--clay);cursor:pointer;background:none;border:none;font-family:'Raleway',sans-serif;padding:0;transition:opacity .2s}
.back-btn:hover{opacity:.7}
.back-btn::before{content:'\2190';font-size:.9rem}
.back-bar{position:fixed;top:88px;left:0;right:0;z-index:490;padding:.6rem 5rem;background:rgba(250,246,239,0.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
.btn-fill{background:var(--clay);color:white;border:none;padding:1rem 2.5rem;font-family:'Raleway',sans-serif;font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-block;transition:background .3s,transform .2s}
.btn-fill:hover{background:var(--bark);transform:translateY(-2px)}
.btn-outline{background:none;border:1px solid var(--border);color:var(--bark);padding:1rem 2.5rem;font-family:'Raleway',sans-serif;font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-block;transition:border-color .3s,color .3s}
.btn-outline:hover{border-color:var(--clay);color:var(--clay)}
.sw{padding:6rem 5rem}.sw.alt{background:var(--parchment)}.sw.dark{background:var(--ink)}
.page-hero{min-height:36vh;display:flex;align-items:flex-end;padding:0 5rem 3rem;background:var(--parchment);position:relative;overflow:hidden}
.page-hero-img{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;opacity:.35}
.page-hero-content{position:relative;z-index:1}
.page-eyebrow{font-size:.65rem;letter-spacing:.32em;text-transform:uppercase;color:var(--clay);margin-bottom:.8rem;display:flex;align-items:center;gap:.8rem}
.page-eyebrow::before{content:'';width:30px;height:1px;background:var(--sand)}
.page-title{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,4vw,3.8rem);font-weight:400;color:var(--ink);line-height:1.1}
.page-title em{font-style:italic;color:var(--clay)}
.s-label{display:inline-flex;align-items:center;gap:.8rem;font-size:.65rem;letter-spacing:.32em;text-transform:uppercase;color:var(--clay);margin-bottom:1rem}
.s-label::before{content:'\25C6';font-size:.45rem}
.s-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,3vw,3.2rem);font-weight:400;line-height:1.15;color:var(--ink)}
.s-title em{font-style:italic;color:var(--clay)}
.s-title.lt{color:var(--warm)}.s-title.lt em{color:var(--sand)}
.product-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.8rem}
.product-card{position:relative;cursor:pointer}
.product-thumb{aspect-ratio:3/4;background:var(--warm);overflow:hidden;position:relative;margin-bottom:.9rem}
.product-thumb-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:transform .6s cubic-bezier(.4,0,.2,1)}
.product-card:hover .product-thumb-inner{transform:scale(1.06)}
.p-badge{position:absolute;top:.9rem;left:.9rem;background:var(--clay);color:white;font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;padding:.28rem .65rem;z-index:2}
.p-overlay{position:absolute;inset:0;background:rgba(28,24,18,.55);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;z-index:3}
.product-card:hover .p-overlay{opacity:1}
.p-btn{background:var(--cream);color:var(--ink);border:none;padding:.65rem 1.5rem;font-family:'Raleway',sans-serif;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer}
.p-name{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:400;color:var(--ink);margin-bottom:.3rem}
.p-row{display:flex;justify-content:space-between;align-items:center}
.p-mat{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--sage)}
.p-price{font-family:'Playfair Display',serif;font-size:1rem;color:var(--clay)}
.filter-row{display:flex;gap:1rem;flex-wrap:wrap}
.filter-btn{background:none;border:1px solid var(--border);color:var(--clay);font-family:'Raleway',sans-serif;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;padding:.4rem 1rem;cursor:pointer;transition:all .25s}
.filter-btn.active,.filter-btn:hover{background:var(--clay);color:white;border-color:var(--clay)}
.faq-item{border-bottom:1px solid var(--border);overflow:hidden}
.faq-q{width:100%;background:none;border:none;display:flex;justify-content:space-between;align-items:center;padding:1.3rem 0;cursor:pointer;font-family:'Raleway',sans-serif;font-weight:400;font-size:.88rem;color:var(--bark);text-align:left;transition:color .3s}
.faq-q:hover{color:var(--clay)}
.faq-icon{font-size:1.3rem;color:var(--sand);transition:transform .35s;flex-shrink:0}
.faq-item.open .faq-icon{transform:rotate(45deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .4s;font-size:.85rem;line-height:1.9;color:var(--clay)}
.faq-item.open .faq-a{max-height:300px;padding-bottom:1.2rem}
.test-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem}
.test-card{background:var(--cream);border:1px solid var(--border);padding:2.5rem;position:relative}
.test-card::before{content:'\201C';font-family:'Playfair Display',serif;font-size:4.5rem;color:var(--sand);opacity:.5;position:absolute;top:.8rem;left:1.5rem;line-height:1}
.test-stars{color:var(--sand);font-size:.75rem;margin-bottom:.8rem}
.test-quote{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;line-height:1.8;color:var(--bark);margin-bottom:1.5rem}
.test-name{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--clay)}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:6rem}
.c-dlabel{font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:var(--sand);margin-bottom:.4rem}
.c-dval{font-size:.88rem;line-height:1.8;color:rgba(232,213,181,.55)}
.contact-detail{margin-top:2rem}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.f-group{display:flex;flex-direction:column;margin-bottom:1rem}
.f-label{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(232,213,181,.4);margin-bottom:.5rem}
.f-input,.f-select,.f-textarea{background:rgba(255,255,255,.04);border:1px solid rgba(196,169,125,.2);color:var(--warm);padding:.85rem 1rem;font-family:'Raleway',sans-serif;font-size:.85rem;font-weight:300;outline:none;resize:none;transition:border-color .3s}
.f-input:focus,.f-select:focus,.f-textarea:focus{border-color:var(--sand)}
.f-select option{background:var(--ink)}
.f-submit{width:100%;background:var(--clay);color:white;border:none;padding:1rem;font-family:'Raleway',sans-serif;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;margin-top:.5rem;transition:background .3s}
.f-submit:hover{background:var(--sand);color:var(--ink)}
.about-vis{background:var(--warm);position:relative;display:flex;align-items:center;justify-content:center;padding:5rem 4rem}
.about-vis::after{content:'';position:absolute;top:2rem;left:2rem;right:2rem;bottom:2rem;border:1px solid rgba(122,92,62,.3);pointer-events:none}
footer{background:#110e0a;padding:4rem 5rem 2rem}
.footer-top{display:grid;grid-template-columns:2.2fr 1fr 1fr 1fr;gap:3.5rem;padding-bottom:3rem;border-bottom:1px solid rgba(255,255,255,.07)}
.f-brand-name{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--warm);margin-bottom:.8rem}
.f-brand-name span{color:var(--sand);font-style:italic}
.f-about{font-size:.8rem;line-height:1.9;color:rgba(255,255,255,.3);max-width:280px}
.f-col-title{font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;color:var(--sand);margin-bottom:1.3rem}
.f-links{list-style:none}
.f-links li{margin-bottom:.65rem}
.f-links a{font-size:.8rem;color:rgba(255,255,255,.35);text-decoration:none;transition:color .3s;cursor:pointer}
.f-links a:hover{color:var(--sand)}
.footer-bottom{padding-top:2rem;display:flex;justify-content:space-between;align-items:center}
.f-copy{font-size:.7rem;color:rgba(255,255,255,.25)}
.f-socials{display:flex;gap:.8rem}
.f-social{width:34px;height:34px;border:1px solid rgba(196,169,125,.25);display:flex;align-items:center;justify-content:center;color:var(--sand);font-size:.72rem;text-decoration:none;transition:all .3s;cursor:pointer}
.f-social:hover{background:var(--sand);color:var(--ink);border-color:var(--sand)}
.co{position:fixed;inset:0;background:rgba(28,24,18,.6);z-index:800;opacity:0;pointer-events:none;transition:opacity .35s}
.co.open{opacity:1;pointer-events:all}
.cp{position:fixed;top:0;right:0;height:100%;width:420px;background:var(--cream);z-index:801;transform:translateX(100%);transition:transform .45s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.cp.open{transform:translateX(0)}
.cp-head{display:flex;justify-content:space-between;align-items:center;padding:2rem 2rem 1.5rem;border-bottom:1px solid var(--border)}
.cp-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:400}
.cp-close{background:none;border:none;font-size:1.6rem;cursor:pointer;color:var(--clay);line-height:1}
.cp-body{flex:1;overflow-y:auto;padding:1.5rem 2rem}
.cp-empty{text-align:center;padding:3rem 0;font-family:'Playfair Display',serif;font-style:italic;font-size:1.05rem;color:var(--sage)}
.cp-item{display:grid;grid-template-columns:72px 1fr auto;gap:1rem;align-items:center;padding:1rem 0;border-bottom:1px solid var(--border)}
.cp-thumb{width:72px;height:72px;background:var(--warm);display:flex;align-items:center;justify-content:center;overflow:hidden}
.cp-name{font-family:'Playfair Display',serif;font-size:.95rem}
.cp-price{font-size:.82rem;color:var(--clay);margin-top:.3rem}
.cp-remove{background:none;border:none;color:var(--sage);cursor:pointer;font-size:1.2rem}
.cp-foot{padding:1.5rem 2rem;border-top:1px solid var(--border)}
.cp-total{display:flex;justify-content:space-between;font-family:'Playfair Display',serif;font-size:1.05rem;margin-bottom:1.2rem}
.cp-checkout{width:100%;background:var(--clay);color:white;border:none;padding:1rem;font-family:'Raleway',sans-serif;font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;cursor:pointer}
.cp-checkout:hover{background:var(--bark)}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bark);color:var(--warm);padding:.85rem 2rem;font-size:.78rem;letter-spacing:.1em;border-left:3px solid var(--sand);z-index:9999;transition:transform .4s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.reveal{opacity:0;transform:translateY(28px);transition:opacity .75s ease,transform .75s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
@media(max-width:1100px){nav{padding:1.2rem 2.5rem}.sw{padding:5rem 3rem}.product-grid{grid-template-columns:repeat(2,1fr)}.contact-grid{grid-template-columns:1fr}.footer-top{grid-template-columns:1fr 1fr;gap:2.5rem}.page-hero{padding:0 3rem 2.5rem}.back-bar{padding:.6rem 3rem}#checkout-main{grid-template-columns:1fr}}
@media(max-width:640px){nav{padding:1rem 1.5rem}.nav-links{display:none}.sw{padding:4rem 1.5rem}.product-grid{grid-template-columns:1fr 1fr;gap:1rem}.test-grid{grid-template-columns:1fr}.footer-top{grid-template-columns:1fr}.cp{width:100%}.f-row{grid-template-columns:1fr}.page-hero{padding:0 1.5rem 2rem}.back-bar{padding:.5rem 1.5rem}}
</style>
</head>
<body>

<script>
var pages={"home":"<section style=\"min-height:100vh;padding-top:88px;display:grid;grid-template-columns:55% 45%;position:relative;overflow:hidden;\"><div style=\"display:flex;flex-direction:column;justify-content:center;padding:5rem 3rem 5rem 5rem;\"><div style=\"display:flex;align-items:center;gap:1rem;font-size:.68rem;letter-spacing:.32em;text-transform:uppercase;color:var(--clay);margin-bottom:2rem;opacity:0;animation:fadeUp .9s .2s forwards;\">Artisan Studio · Est. 2009</div><h1 style=\"font-family:'Playfair Display',serif;font-size:clamp(3rem,4.5vw,5.2rem);font-weight:400;line-height:1.08;color:var(--ink);margin-bottom:1.8rem;opacity:0;animation:fadeUp .9s .4s forwards;\">Jewelry born from <em>light</em> and <em>intention</em></h1><p style=\"font-size:.92rem;line-height:2;color:var(--clay);max-width:400px;margin-bottom:3rem;opacity:0;animation:fadeUp .9s .6s forwards;\">Each VerityLights piece is shaped by hand — unhurried, intentional, and made to carry meaning. Wear something true.</p><div style=\"display:flex;gap:1.2rem;align-items:center;opacity:0;animation:fadeUp .9s .8s forwards;\"><button class=\"btn-fill\" onclick=\"navigate('shop')\">Explore Collection</button><button class=\"btn-outline\" onclick=\"navigate('story')\">Our Craft</button></div></div><div style=\"position:relative;background:var(--parchment);overflow:hidden;\"><div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;\"><svg style=\"width:76%;opacity:0;animation:fadeIn 1.4s .5s forwards;\" viewBox=\"0 0 480 560\" fill=\"none\"><ellipse cx=\"240\" cy=\"260\" rx=\"160\" ry=\"180\" fill=\"rgba(196,169,125,.12)\"/><path d=\"M 240 60 Q 238 130 240 170\" stroke=\"#c4a97d\" stroke-width=\"2\" fill=\"none\" stroke-dasharray=\"5,3\" opacity=\".6\"/><polygon points=\"240,170 272,198 264,238 216,238 208,198\" fill=\"#c4a97d\" opacity=\".28\"/><polygon points=\"240,170 272,198 240,218\" fill=\"#c4a97d\" opacity=\".55\"/><ellipse cx=\"145\" cy=\"350\" rx=\"48\" ry var observer=new IntersectionObserver(function(entries){entries.forEach(function(e,i){if(e.isIntersecting){e.target.style.transitionDelay=(i*.07)+"s";e.target.classList.add("visible");observer.unobserve(e.target);}});},{threshold:.1});
function navigate(page){
  var mount=document.getElementById("pageMount");
  var backBar=document.getElementById("backBar");
  backBar.style.display=page==="home"?"none":"block";
  mount.style.paddingTop=page==="home"?"0":"40px";
  document.querySelectorAll(".nav-links a").forEach(function(a){a.classList.toggle("active-nav",a.id==="nav-"+page);});
  window.scrollTo(0,0);
  mount.innerHTML=pages[page]||pages.home;
  mount.querySelectorAll(".reveal").forEach(function(el){observer.observe(el);});
  if(document.getElementById("productGrid"))renderProducts("all");
  if(document.getElementById("co-items"))renderCheckoutSummary();
}
function renderProducts(filter){
  var grid=document.getElementById("productGrid");if(!grid)return;grid.innerHTML="";
  var list=products.filter(function(p){
    if(!filter||filter==="all"||p.cat===filter)return true;
    if(p.cat==="sets"&&p.setIncludes){if(filter==="earrings"&&p.setIncludes.indexOf("earrings")>-1)return true;if(filter==="necklaces"&&p.setIncludes.indexOf("necklaces")>-1)return true;}
    return false;
  });
  list.forEach(function(p){
    var el=document.createElement("div");el.className="product-card reveal";
    var thumb=p.img?"<img src=\""+p.img+"\" style=\"width:100%;height:100%;object-fit:cover;\">":svgs[p.svg]||"";
    el.innerHTML="<div class=\"product-thumb\">"+(p.tag?"<div class=\"p-badge\">"+p.tag+"</div>":"")+"<div class=\"product-thumb-inner\">"+thumb+"</div><div class=\"p-overlay\"><button class=\"p-btn\" onclick=\"addToCart("+p.id+",'"+p.name+"',"+p.price+",'"+p.svg+"','"+p.img+"')\" >Add to Cart</button></div></div><div class=\"p-name\">"+p.name+"</div><div class=\"p-row\"><span class=\"p-mat\">"+p.mat+"</span><span class=\"p-price\">$"+p.price.toLocaleString()+"</span></div>";
    grid.appendChild(el);observer.observe(el);
  });
}
function filterProducts(cat,btn){document.querySelectorAll(".filter-btn").forEach(function(b){b.classList.remove("active");});btn.classList.add("active");renderProducts(cat);}
function addToCart(id,name,price,svg,img){var ex=cart.find(function(i){return i.id===id;});if(ex)ex.qty++;else cart.push({id:id,name:name,price:price,svg:svg,img:img,qty:1});renderCart();showToast(name+" added &#9670;");}
function removeFromCart(id){cart=cart.filter(function(i){return i.id!==id;});renderCart();}
function renderCart(){
  var body=document.getElementById("cBody");
  document.getElementById("cartCount").textContent=cart.reduce(function(s,i){return s+i.qty;},0);
  document.getElementById("cTotal").textContent="$"+cart.reduce(function(s,i){return s+i.price*i.qty;},0).toLocaleString();
  body.querySelectorAll(".cp-item").forEach(function(e){e.remove();});
  document.getElementById("cEmpty").style.display=cart.length?"none":"block";
  cart.forEach(function(item){var el=document.createElement("div");el.className="cp-item";var th=item.img?"<img src=\""+item.img+"\" style=\"width:72px;height:72px;object-fit:cover\">":svgs[item.svg]||"";el.innerHTML="<div class=\"cp-thumb\">"+th+"</div><div><div class=\"cp-name\">"+item.name+"</div><div class=\"cp-price\">$"+item.price.toLocaleString()+" &#215; "+item.qty+"</div></div><button class=\"cp-remove\" onclick=\"removeFromCart("+item.id+")\">&#215;</button>";body.appendChild(el);});
}
function openCart(){document.getElementById("cPanel").classList.add("open");document.getElementById("cOverlay").classList.add("open");}
function closeCart(){document.getElementById("cPanel").classList.remove("open");document.getElementById("cOverlay").classList.remove("open");}
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2800);}
function toggleFaq(btn){var item=btn.parentElement;var was=item.classList.contains("open");document.querySelectorAll(".faq-item").forEach(function(i){i.classList.remove("open");});if(!was)item.classList.add("open");}

document.addEventListener("mousemove",function(e){mx=e.clientX;my=e.clientY;cur.style.left=mx+"px";cur.style.top=my+"px";});

function toggleBilling(){var w=document.getElementById("co-billing-wrap");if(w)w.style.display=document.getElementById("co-diff-billing").checked?"block":"none";}
var discountApplied={code:"",pct:0};
var DISCOUNT_CODES={"VERITY10":{"pct":10,"label":"10% off"},"LIGHTS20":{"pct":20,"label":"20% off"},"WELCOME15":{"pct":15,"label":"15% off"}};
var CO_FREE_THRESHOLD=120;
var CO_SHIP_COST=12;
var CO_SHIP_FREE_LABEL="Free";
function applyDiscount(){
  var inp=document.getElementById("co-discount");
  var msg=document.getElementById("co-discount-msg");
  if(!inp||!msg)return;
  var code=(inp.value||"").trim().toUpperCase();
  var found=DISCOUNT_CODES[code];
  msg.style.display="block";
  if(!code){msg.textContent="Please enter a code.";msg.style.color="var(--clay)";return;}
  if(found){discountApplied={code:code,pct:found.pct,label:found.label};msg.textContent="Code applied: "+found.label;msg.style.color="#5a8a5a";}
  else{discountApplied={code:"",pct:0};msg.textContent="Code not recognised.";msg.style.color="#c0392b";}
  renderCheckoutSummary();
}
function fmtCard(el){var v=el.value.replace(/\D/g,"").substring(0,16);el.value=v.replace(/(\d{4})(?=\d)/g,"$1 ");}
function fmtExpiry(el){var v=el.value.replace(/\D/g,"").substring(0,4);el.value=v.length>2?v.substring(0,2)+" / "+v.substring(2):v;}
function renderCheckoutSummary(){
  var items=document.getElementById("co-items");
  var empty=document.getElementById("checkout-empty");
  var main=document.getElementById("checkout-main");
  if(!items)return;
  if(!cart.length){if(empty)empty.style.display="block";if(main)main.style.display="none";return;}
  if(empty)empty.style.display="none";if(main)main.style.display="grid";
  items.innerHTML="";
  var sub=0;
  cart.forEach(function(item){
    sub+=item.price*item.qty;
    var row=document.createElement("div");
    row.style.cssText="display:flex;align-items:center;gap:.8rem;padding:.7rem 0;border-bottom:1px solid var(--border);";
    var th=item.img?"<img src=\""+item.img+"\" style=\"width:52px;height:52px;object-fit:cover;border-radius:2px;flex-shrink:0;\">":"<div style=\"width:52px;height:52px;background:var(--warm);display:flex;align-items:center;justify-content:center;flex-shrink:0;\">"+svgs[item.svg]+"</div>";
    row.innerHTML=th+"<div style=\"flex:1;\"><div style=\"font-family:'Playfair Display',serif;font-size:.9rem;color:var(--ink)\">"+item.name+"</div><div style=\"font-size:.72rem;color:var(--sage);margin-top:.2rem\">Qty: "+item.qty+"</div></div><div style=\"font-family:'Playfair Display',serif;font-size:.9rem;color:var(--clay)\">$"+(item.price*item.qty).toLocaleString()+"</div>";
    items.appendChild(row);
  });
  var shipFree=sub>=CO_FREE_THRESHOLD;
  var ship=shipFree?0:CO_SHIP_COST;
  var shipLabel=shipFree?CO_SHIP_FREE_LABEL:"$"+CO_SHIP_COST.toFixed(2);
  var discAmt=discountApplied.pct?Math.round(sub*(discountApplied.pct/100)):0;
  var total=sub-discAmt+ship;
  var subEl=document.getElementById("co-sub");if(subEl)subEl.textContent="$"+sub.toLocaleString();
  var discRow=document.getElementById("co-discount-row");var discAmtEl=document.getElementById("co-discount-amt");var discLbl=document.getElementById("co-discount-label");
  if(discRow){discRow.style.display=discAmt?"flex":"none";}
  if(discLbl&&discountApplied.label)discLbl.textContent=discountApplied.label;
  if(discAmtEl)discAmtEl.textContent=discAmt?"-$"+discAmt.toLocaleString():"";
  var shipEl=document.getElementById("co-ship");if(shipEl)shipEl.textContent=shipLabel;
  var totEl=document.getElementById("co-total");if(totEl)totEl.textContent="$"+total.toLocaleString();
}
function placeOrder(){
  var required=["co-fname","co-lname","co-email","co-addr1","co-city","co-state","co-zip","co-cardname","co-cardnum","co-expiry","co-cvv"];
  var ok=true;
  required.forEach(function(id){var el=document.getElementById(id);if(el){if(!el.value.trim()){el.style.borderColor="#c0392b";ok=false;}else el.style.borderColor="rgba(122,92,62,.2)";}});
  if(!ok){showToast("Please fill in all required fields");return;}
  var conf=document.getElementById("co-confirm");
  if(conf){conf.style.display="flex";}
}
function confirmClose(){var conf=document.getElementById("co-confirm");if(conf)conf.style.display="none";cart=[];renderCart();navigate("home");}
</script>
